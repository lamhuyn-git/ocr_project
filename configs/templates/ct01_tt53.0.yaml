    padding_x: 14
    padding_y: 2

  thanh_vien_cung_thay_doi:
    type: table
    roi_norm: { x: 0.1519, y: 0.5412, w: 0.7421, h: 0.1818 }
    padding_x: 10
    padding_y: 4
    table:
      header_h_frac: 0.0    # box ROI đã loại hàng tiêu đề → không cắt thêm phần đầu
      min_ink: 60           # mực tối thiểu (sau khử kẻ) để coi bảng có nội dung
      columns: [tt, ho_ten, ngay_sinh, gioi_tinh, so_dinh_danh, quan_he]
      # Fallback ranh cột (tỉ lệ theo bề ngang ROI) khi dò kẻ dọc không đủ 7 mốc.
      col_x_frac: [0.0, 0.07, 0.36, 0.52, 0.61, 0.84, 1.0]
      cell_normalize:
        tt: [trim, strip_space]
        ho_ten: [nfc, trim, collapse_ws, strip_trail_punct]
        ngay_sinh: [trim, date_ddmmyyyy, strip_space]
        gioi_tinh: [nfc, trim, strip_space, gioi_tinh_snap]
        so_dinh_danh: [trim, strip_space]
        quan_he: [nfc, trim, collapse_ws, strip_trail_punct]
